# macros.conf — test app
# Promoted macros from dev. Naming convention: test_<purpose>(<args>)

[test_internal_errors(1)]
args = timerange
definition = index=_internal sourcetype=splunkd log_level IN (ERROR, CRITICAL) earliest=$timerange$ latest=now
iseval = 0

[test_internal_errors]
definition = index=_internal sourcetype=splunkd log_level IN (ERROR, CRITICAL) earliest=-1h latest=now
iseval = 0

[test_base_health]
definition = index=_internal sourcetype=splunkd earliest=-15m latest=now
iseval = 0
