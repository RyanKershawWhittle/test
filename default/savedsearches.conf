# savedsearches.conf — test app
# Promoted searches from dev land here after validation.
# DO NOT create searches via the Splunk UI without running Sync-SplunkApp.ps1 afterwards.

[Test - Platform Error Rate - Alert]
search = index=_internal sourcetype=splunkd log_level IN (ERROR, CRITICAL) earliest=-5m latest=now \
    | stats count AS errors \
    | where errors > 50
cron_schedule = */5 * * * *
enableSched = 0
dispatch.earliest_time = -5m
dispatch.latest_time = now
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.suppress = 0
description = Fires when splunkd ERROR/CRITICAL count exceeds 50 in a 5-minute window.

[Test - Indexing Throughput - Report]
search = index=_internal sourcetype=splunkd component=Metrics group=thruput earliest=-1h latest=now \
    | timechart span=5m avg(instantaneous_kbps) AS avg_kbps
cron_schedule = 0 * * * *
enableSched = 0
dispatch.earliest_time = -1h
dispatch.latest_time = now
description = Hourly report of indexing throughput in KB/s.
